name: Official
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ci:
    name: CI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22
            os: ubuntu-22.04
          - name: Ubuntu 24
            os: ubuntu-24.04
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
    steps:
      - name: checkout source
        uses: actions/checkout@v4
      - name: install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            ca-certificates
      - name: install clippy
        run: rustup component add clippy
      - name: build
        run: cargo build
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy -- -D warnings
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: audit
        run: cargo audit

  ci-qt-webkit:
    name: CI (Qt WebKit)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout source
        uses: actions/checkout@v4
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            ca-certificates \
            cmake \
            qt6-webengine-dev \
            qt6-base-dev \
            libgl-dev
      - name: install clippy
        run: rustup component add clippy
      - name: build
        run: cargo build --features qt-webkit
      - name: test
        run: cargo test --features qt-webkit
      - name: clippy
        run: cargo clippy --features qt-webkit -- -D warnings

  ci-ubuntu-25:
    name: CI (Ubuntu 25)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ubuntu:25.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl \
            build-essential \
            pkg-config \
            libssl-dev \
            ca-certificates
      - name: install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - name: checkout source
        uses: actions/checkout@v4
      - name: install clippy
        run: |
          . "$HOME/.cargo/env"
          rustup component add clippy
      - name: build
        run: |
          . "$HOME/.cargo/env"
          cargo build
      - name: test
        run: |
          . "$HOME/.cargo/env"
          cargo test
      - name: clippy
        run: |
          . "$HOME/.cargo/env"
          cargo clippy -- -D warnings
      - name: install cargo-audit
        run: |
          . "$HOME/.cargo/env"
          cargo install --locked cargo-audit
      - name: audit
        run: |
          . "$HOME/.cargo/env"
          cargo audit
