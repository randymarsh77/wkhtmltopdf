name: Official
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  linux:
    name: Qt 4.8 on Linux
    runs-on: ubuntu-20.04
    steps:
      - name: checkout source
        uses: actions/checkout@v2
        with:
          path: wkhtmltopdf
          submodules: true
      - name: checkout packaging
        uses: actions/checkout@v2
        with:
          repository: wkhtmltopdf/packaging
          path: packaging
      - name: configure docker
        run:  |
          echo '{ "experimental": true }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: build
        run: cd packaging && python3 ./build package-docker buster-amd64 ../wkhtmltopdf

  macos:
    name: Qt 4.8 on macOS
    runs-on: macos-10.15
    steps:
      - name: checkout source
        uses: actions/checkout@v2
        with:
          path: wkhtmltopdf
          submodules: true
      - name: checkout packaging
        uses: actions/checkout@v2
        with:
          repository: wkhtmltopdf/packaging
          path: packaging
      - name: setup build environment
        run: |
          brew install conan
          pip3 install pyyaml
          sudo gem install fpm --no-document
          sudo xcode-select --switch /Library/Developer/CommandLineTools
          sed -i -e 's/CFLAGS CXXFLAGS LDFLAGS/CFLAGS CXXFLAGS OBJECTIVE_CFLAGS LDFLAGS/g' wkhtmltopdf/qt/configure
          sed -i -e 's/compiler.version=9.0/compiler.version=12.0/g' packaging/.conan/profiles/macos-cocoa
      - name: build
        run: cd packaging && MACOSX_DEPLOYMENT_TARGET=10.7 python3 ./build vagrant macos-cocoa --clean --version - - ../wkhtmltopdf

  ci:
    name: CI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22
            os: ubuntu-22.04
          - name: Ubuntu 24
            os: ubuntu-24.04
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
    steps:
      - name: checkout source
        uses: actions/checkout@v4
      - name: install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            ca-certificates
      - name: install clippy
        run: rustup component add clippy
      - name: build
        run: cargo build
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy -- -D warnings
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: audit
        run: cargo audit

  ci-qt-webkit:
    name: CI (Qt WebKit)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout source
        uses: actions/checkout@v4
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            ca-certificates \
            cmake \
            qt6-webengine-dev \
            qt6-base-dev \
            libgl-dev
      - name: install clippy
        run: rustup component add clippy
      - name: build
        run: cargo build --features qt-webkit
      - name: test
        run: cargo test --features qt-webkit
      - name: clippy
        run: cargo clippy --features qt-webkit -- -D warnings

  ci-ubuntu-25:
    name: CI (Ubuntu 25)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ubuntu:25.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl \
            build-essential \
            pkg-config \
            libssl-dev \
            ca-certificates
      - name: install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - name: checkout source
        uses: actions/checkout@v4
      - name: install clippy
        run: |
          . "$HOME/.cargo/env"
          rustup component add clippy
      - name: build
        run: |
          . "$HOME/.cargo/env"
          cargo build
      - name: test
        run: |
          . "$HOME/.cargo/env"
          cargo test
      - name: clippy
        run: |
          . "$HOME/.cargo/env"
          cargo clippy -- -D warnings
      - name: install cargo-audit
        run: |
          . "$HOME/.cargo/env"
          cargo install --locked cargo-audit
      - name: audit
        run: |
          . "$HOME/.cargo/env"
          cargo audit

  windows:
    name: Qt 4.8 on Windows
    runs-on: windows-2019
    steps:
      - name: checkout source
        uses: actions/checkout@v2
        with:
          path: wkhtmltopdf
          submodules: true
      - name: checkout packaging
        uses: actions/checkout@v2
        with:
          repository: wkhtmltopdf/packaging
          path: packaging
      - name: setup build environment
        run: |
          choco install -yr --no-progress vcbuildtools -ia "/Full"
          pip install -q conan
          cmd /c attrib "C:\Program Files (x86)\Windows Kits\10\include\wdf" +H
      - name: build
        run: cd packaging && python ./build vagrant msvc2015-win64 --clean --version - - ../wkhtmltopdf
