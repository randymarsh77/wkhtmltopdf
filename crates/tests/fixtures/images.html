<!DOCTYPE html>
<html>
<head>
  <title>Images</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    figure { display: inline-block; margin: 16px; text-align: center; }
    figcaption { font-size: 0.85em; color: #555; margin-top: 4px; }
    img { display: block; max-width: 200px; }
    .svg-container { border: 1px solid #ccc; padding: 8px; display: inline-block; }
  </style>
</head>
<body>
  <h1>Image Fixtures</h1>

  <h2>Inline SVG</h2>
  <div class="svg-container">
    <svg width="200" height="100" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="100" fill="#4a90d9"/>
      <circle cx="100" cy="50" r="35" fill="#f5a623"/>
      <text x="100" y="55" text-anchor="middle" fill="white" font-size="14" font-family="Arial">SVG Shape</text>
    </svg>
  </div>

  <h2>Base64 Encoded PNG</h2>
  <figure>
    <!-- 1x1 red pixel PNG encoded as base64 -->
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==" alt="1x1 red pixel" width="50" height="50" style="image-rendering: pixelated; background: #e00;">
    <figcaption>Base64 PNG (1×1 pixel, scaled)</figcaption>
  </figure>

  <h2>SVG Chart</h2>
  <div class="svg-container">
    <svg width="300" height="150" xmlns="http://www.w3.org/2000/svg">
      <title>Bar Chart</title>
      <!-- Axes -->
      <line x1="30" y1="10" x2="30" y2="130" stroke="black" stroke-width="2"/>
      <line x1="30" y1="130" x2="290" y2="130" stroke="black" stroke-width="2"/>
      <!-- Bars -->
      <rect x="50"  y="50"  width="40" height="80" fill="#4a90d9"/>
      <rect x="110" y="30"  width="40" height="100" fill="#7ed321"/>
      <rect x="170" y="70"  width="40" height="60"  fill="#d0021b"/>
      <rect x="230" y="40"  width="40" height="90"  fill="#f5a623"/>
      <!-- Labels -->
      <text x="70"  y="145" text-anchor="middle" font-size="10" font-family="Arial">A</text>
      <text x="130" y="145" text-anchor="middle" font-size="10" font-family="Arial">B</text>
      <text x="190" y="145" text-anchor="middle" font-size="10" font-family="Arial">C</text>
      <text x="250" y="145" text-anchor="middle" font-size="10" font-family="Arial">D</text>
    </svg>
  </div>

  <h2>SVG with Gradients</h2>
  <div class="svg-container">
    <svg width="200" height="80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   style="stop-color:#4a90d9;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#7ed321;stop-opacity:1"/>
        </linearGradient>
      </defs>
      <rect width="200" height="80" fill="url(#grad1)" rx="10" ry="10"/>
      <text x="100" y="45" text-anchor="middle" fill="white" font-size="14" font-family="Arial">Gradient</text>
    </svg>
  </div>
</body>
</html>
